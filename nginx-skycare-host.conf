# SkyCare Portal — host nginx only; frontend/backend stay in Docker.
# Included from the main `http { }` via: include /etc/nginx/sites-enabled/*;
# Install on VPS: paste this whole file into /etc/nginx/sites-available/skycare-portal
#   sudo nano /etc/nginx/sites-available/skycare-portal
#   sudo ln -sf /etc/nginx/sites-available/skycare-portal /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: explicit ssl_* below (certbot certonly --webroot does not create
# /etc/letsencrypt/options-ssl-nginx.conf; that file appears with certbot --nginx).
#
# One Certbot certificate for both hostnames is stored under a single directory,
# usually /etc/letsencrypt/live/<certificate-name>/ (certificate name is often
# the first -d you passed, e.g. stg.skycare.au). BOTH HTTPS server blocks below
# must point at that same fullchain.pem and privkey.pem. If you later issue
# separate certs per hostname, set ssl_certificate paths per server block.
#
# Upstreams must match docker-compose host ports:
#   Production: frontend 127.0.0.1:8081, backend 127.0.0.1:5001
#   Staging:    frontend 127.0.0.1:8082, backend 127.0.0.1:5002

upstream skycare_frontend_prod {
    server 127.0.0.1:8081;
    keepalive 16;
}

upstream skycare_backend_prod {
    server 127.0.0.1:5001;
    keepalive 16;
}

upstream skycare_frontend_stg {
    server 127.0.0.1:8082;
    keepalive 16;
}

upstream skycare_backend_stg {
    server 127.0.0.1:5002;
    keepalive 16;
}

# HTTP — ACME + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name stg.skycare.au skycare.au;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Staging — HTTPS

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name stg.skycare.au;

    client_max_body_size 50M;

    ssl_certificate     /etc/letsencrypt/live/stg.skycare.au/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stg.skycare.au/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;

    location / {
        proxy_pass http://skycare_frontend_stg;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        client_max_body_size 50M;
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://skycare_backend_stg;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /mobile/api/ {
        client_max_body_size 50M;
        rewrite ^/mobile/api/(.*)$ /$1 break;
        proxy_pass http://skycare_backend_stg;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

